<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>app-lp | アプリランディングページ</title>
  <meta name="description" content="ASB ScreeningのアプリLP一覧ページです。キンヤチョ と フォトワケ のLPへ移動できます。">
  <meta property="og:type" content="website">
  <meta property="og:title" content="app-lp | アプリランディングページ">
  <meta property="og:description" content="キンヤチョ と フォトワケ のLP一覧ページです。">
  <meta property="og:url" content="https://lp.asb-screening.com/">
  <meta property="og:image" content="https://lp.asb-screening.com/assets/common/ogp/ogp.svg">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="stylesheet" href="/styles/common.css">
  <link rel="stylesheet" href="/styles/hub.css">
</head>
<body>
  <main class="hub-main" aria-labelledby="hub-title">
    <div class="container hub-shell">
      <p class="hub-kicker">APP LP HUB</p>
      <h1 id="hub-title">アプリランディングページ</h1>
      <p class="hub-lead">公開中のLPを選択してください。</p>

      <div class="hub-grid" role="list" aria-label="LP一覧">
        <article class="hub-card" role="listitem">
          <img class="hub-card__icon" src="/assets/hub/icons/kinyacho-icon.png" alt="キンヤチョのアプリアイコン">
          <h2>キンヤチョ</h2>
          <p>現場主導で記録運用を検証するオフライン対応アプリ。</p>
          <a class="hub-button" href="/kinyacho">LPを見る</a>
        </article>

        <article class="hub-card" role="listitem">
          <img class="hub-card__icon" src="/assets/hub/icons/photowake-icon.png" alt="フォトワケのアプリアイコン">
          <h2>フォトワケ</h2>
          <p>スワイプ操作で写真を高速整理するローカル完結アプリ。</p>
          <a class="hub-button" href="/photowake">LPを見る</a>
        </article>
      </div>
    </div>
  </main>
</body>
</html>
